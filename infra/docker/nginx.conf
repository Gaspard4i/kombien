# Sert le build statique Vite et proxy /api vers le service api (réseau Docker interne).
# Le certificat HTTPS et le domaine sont gérés par Traefik en amont (voir infra/traefik/).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;
    gzip_min_length 512;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Assets hashés par Vite (fichiers immuables) : cache long.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA : toute route inconnue retombe sur index.html (pas de cache, sinon
    # les déploiements suivants serviraient un index.html périmé référençant
    # des assets hashés supprimés).
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri /index.html;
    }
}
